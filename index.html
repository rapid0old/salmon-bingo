<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サーモンラン武器ビンゴ</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

.weaponRow{
margin:20px 0;
}

.weaponGrid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
}

.weaponBtn{
width:60px;
height:60px;
border:none;
background:none;
padding:0;
}

.weaponBtn img{
width:100%;
height:100%;
}

.done{
background:rgba(255,140,0,0.5);
border-radius:6px;
}

.progressBar{
width:80%;
height:18px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff7b00;
width:0%;
}

</style>

</head>

<body>

<h2>サーモンラン武器ビンゴ</h2>

<div class="progressBar">
<div id="totalBar" class="fill"></div>
</div>

<div id="totalText"></div>

<div class="container" id="weaponContainer"></div>

<script>

const weaponData={

{ name:"シューター", folder:"shooter", weapons:[
"bold.png",
"wakaba.png",
"sharp.png",
"pro.png",
"splat.png",
"galon52.png",
"nzap.png",
"prime.png",
"galon96.png",
"jet.png",
"spzce.png",
"l3.png",
"h3.png",
"bottle.png"
]},

{ name:"ローラー", folder:"roller", weapons:[
"carbon.png",
"dynamo.png",
"splat.png",
"variable.png",
"wide.png"
]},

{ name:"チャージャー", folder:"charger", weapons:[
"squic.png",
"splat.png",
"liter.png",
"take.png",
"soi.png",
"pen.png"
]},

{ name:"スロッシャー", folder:"slosher", weapons:[
"bucket.png",
"hissen.png",
"screw.png",
"over.png",
"ex.png",
"mop.png"
]},

{ name:"スピナー", folder:"splatling", weapons:[
"splat.png",
"barrel.png",
"hyd.png",
"cugel.png",
"norch.png",
"ixa.png"
]},

{ name:"マニューバー", folder:"dualies", weapons:[
"spat.png",
"splat.png",
"kelbin.png",
"dual.png",
"quad.png",
"gaen.png"
]},

{ name:"シェルター", folder:"shelter", weapons:[
"para.png",
"camp.png",
"spy.png",
"kasa.png"
]},
  
{ name:"ブラスター", folder:"blaster", weapons:[
"nova.png",
"hot.png",
"long.png",
"crash.png",
"rapid.png",
"rapide.png",
"sblast.png"
]},

{ name:"フデ", folder:"brush", weapons:[
"pablo.png",
"hokusai.png",
"fin.png"
]},

{ name:"ストリンガー", folder:"stringer", weapons:[
"tri.png",
"lact.png",
"fluid.png"
]},

{ name:"ワイパー", folder:"wiper", weapons:[
"jim.png",
"drive.png",
"dental.png"
]},

{ name:"クマ武器", folder:"kuma", weapons:[
"stringer.png",
"blaster.png",
"shelter.png",
"wiper.png",
"slosher.png",
"charger.png",
"dualies.png",
"roller.png"
]}

}

let state=JSON.parse(localStorage.getItem("salmonState")||"{}")

function save(){
localStorage.setItem("salmonState",JSON.stringify(state))
}

function toggle(id,el){

state[id]=!state[id]

if(state[id]){
el.classList.add("done")
}else{
el.classList.remove("done")
}

save()

updateProgress()

}

function createUI(){

let container=document.getElementById("weaponContainer")

for(let group in weaponData){

let row=document.createElement("div")

row.className="weaponRow"

let title=document.createElement("h3")
title.innerText=group

let grid=document.createElement("div")
grid.className="weaponGrid"

weaponData[group].forEach(name=>{

let btn=document.createElement("button")
btn.className="weaponBtn"

let img=document.createElement("img")
img.src="weapons/"+group+"/"+name

btn.appendChild(img)

let id=group+"_"+name

if(state[id]) btn.classList.add("done")

btn.onclick=()=>toggle(id,btn)

grid.appendChild(btn)

})

row.appendChild(title)
row.appendChild(grid)

container.appendChild(row)

}

}

function updateProgress(){

let total=0
let done=0

for(let group in weaponData){

let gTotal=weaponData[group].length
let gDone=0

weaponData[group].forEach(name=>{

let id=group+"_"+name

total++

if(state[id]){
done++
gDone++
}

})

}

let percent=Math.floor(done/total*100)

document.getElementById("totalBar").style.width=percent+"%"

document.getElementById("totalText").innerText=
done+" / "+total+" ("+percent+"%)"

}

createUI()

updateProgress()

</script>

</body>
</html>
