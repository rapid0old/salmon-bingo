<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サーモンラン武器ビンゴ</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:1000px;
width:95%;
margin:auto;
}

.weaponRow{
margin:30px auto;
padding:25px;
max-width:980px;
background:rgba(0,0,0,0.25);
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.weaponGrid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(90px,90px));
gap:18px;
justify-content:center;
margin-top:10px;
}

.weaponBtn{
width:90px;
height:90px;
border:none;
background:none;
padding:0;
display:flex;
align-items:center;
justify-content:center;
}

.weaponBtn img{
width:70px;          /* 横幅固定 */
height:70px;         /* ← 高さも固定（これ重要） */
object-fit:contain;  /* 画像を潰さず収める */
}

.weaponItem{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start; /* 上揃え */
height:100px;               /* 全体の高さ固定 */
}

.weaponName{
font-size:11px;
color:white;
white-space:normal;
text-align:center;
line-height:1.1;
margin-top:4px;
height:28px;  /* ← 名前エリア固定 */
}

.hideName .weaponName{
display:none;
}

.done{
background:rgba(255,140,0,0.5);
border-radius:6px;
}

.progressBar{
width:80%;
height:18px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff7b00;
width:0%;
}

.groupBar{
width:70%;
height:14px;
background:#333;
margin:10px auto 18px auto;
border-radius:10px;
overflow:hidden;
}

.groupFill{
height:100%;
background:#ff7b00;
width:0%;
}

.complete{
color:#ffd700;
font-weight:bold;
}

.resetBtn{
margin:20px;
padding:18px 36px;
font-size:26px;
background:#ff7b00;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button{
font-size:20px;
padding:12px 20px;
margin:8px;
border-radius:10px;
background:#eee;
border:none;
cursor:pointer;
}

.weaponBtn:hover{
transform:scale(1.1);
transition:0.15s;
}

@media (max-width:600px){

.weaponGrid{
grid-template-columns:repeat(5,1fr);
gap:6px;
}

.weaponBtn{
height:80px;
}

.weaponBtn img{
width:60px;
height:60px;
}

.weaponName{
font-size:13px;
}

.weaponRow{
padding:12px;
margin:18px auto;
}

}
</style>

</head>

<body>

<h2>サーモンラン武器ビンゴ</h2>

<button class="resetBtn" onclick="resetAll()">リセット</button>
<button onclick="showAll()">すべて</button>
<button onclick="showRemain()">未取得のみ</button>
<button onclick="toggleName()">名前 ON/OFF</button>

<div class="progressBar">
<div id="totalBar" class="fill"></div>
</div>

<div id="totalText"></div>
<div id="remainText"></div>

<div class="container" id="weaponContainer"></div>

<script>

// ===== データ =====
const weaponData={
シューター:[
{img:"bold.png", name:"ボールドマーカー"},
{img:"bottle.png", name:"ボトルガイザー"},
{img:"galon52.png", name:".52ガロン"},
{img:"galon96.png", name:".96ガロン"},
{img:"h3.png", name:"H3リールガン"},
{img:"jetsweeper.png", name:"ジェットスイーパー"},
{img:"l3.png", name:"L3リールガン"},
{img:"nzap.png", name:"N-ZAP85"},
{img:"prime.png", name:"プライムシューター"},
{img:"pro.png", name:"プロモデラーMG"},
{img:"sharp.png", name:"シャープマーカー"},
{img:"space.png", name:"スペースシューター"},
{img:"splat.png", name:"スプラシューター"},
{img:"wakaba.png", name:"わかばシューター"}
],

ローラー:[
{img:"carbon.png", name:"カーボンローラー"},
{img:"dynamo.png", name:"ダイナモローラー"},
{img:"splat.png", name:"スプラローラー"},
{img:"variable.png", name:"ヴァリアブルローラー"},
{img:"wide.png", name:"ワイドローラー"}
],

チャージャー:[
{img:"litter.png", name:"リッター4K"},
{img:"pen.png", name:"R-PEN/5H"},
{img:"soi.png", name:"ソイチューバー"},
{img:"splat.png", name:"スプラチャージャー"},
{img:"squic.png", name:"スクイックリンα"},
{img:"take.png", name:"14式竹筒銃・甲"}
],

スロッシャー:[
{img:"bucket.png", name:"バケットスロッシャー"},
{img:"ex.png", name:"エクスプロッシャー"},
{img:"hissen.png", name:"ヒッセン"},
{img:"mop.png", name:"モップリン"},
{img:"over.png", name:"オーバーフロッシャー"},
{img:"screw.png", name:"スクリュースロッシャー"}
],

スピナー:[
{img:"barrel.png", name:"バレルスピナー"},
{img:"cugel.png", name:"クーゲルシュライバー"},
{img:"hyd.png", name:"ハイドラント"},
{img:"ixa.png", name:"イグザミナー"},
{img:"norch.png", name:"ノーチラス47"},
{img:"splat.png", name:"スプラスピナー"}
],

マニューバー:[
{img:"dual.png", name:"デュアルスイーパー"},
{img:"gaen.png", name:"ガエンFF"},
{img:"kelbin.png", name:"ケルビン525"},
{img:"quad.png", name:"クアッドホッパーブラック"},
{img:"spat.png", name:"スパッタリー"},
{img:"splat.png", name:"スプラマニューバー"}
],

シェルター:[
{img:"camp.png", name:"キャンピングシェルター"},
{img:"kasa.png", name:"24式張替傘・甲"},
{img:"para.png", name:"パラシェルター"},
{img:"spy.png", name:"スパイガジェット"}
],

ブラスター:[
{img:"crash.png", name:"クラッシュブラスター"},
{img:"hot.png", name:"ホットブラスター"},
{img:"long.png", name:"ロングブラスター"},
{img:"nova.png", name:"ノヴァブラスター"},
{img:"rapid.png", name:"ラピッドブラスター"},
{img:"rapide.png", name:"Rブラスターエリート"},
{img:"sblast.png", name:"S-BLAST92"}
],

フデ:[
{img:"fin.png", name:"フィンセント"},
{img:"hokusai.png", name:"ホクサイ"},
{img:"pablo.png", name:"パブロ"}
],

ストリンガー:[
{img:"fluid.png", name:"フルイドV"},
{img:"lact.png", name:"LACT-450"},
{img:"tri.png", name:"トライストリンガー"}
],

ワイパー:[
{img:"dental.png", name:"デンタルワイパー"},
{img:"drive.png", name:"ドライブワイパー"},
{img:"jim.png", name:"ジムワイパー"}
],

クマ武器:[
{img:"blaster.png", name:"ブラスター"},
{img:"charger.png", name:"チャージャー"},
{img:"dualies.png", name:"マニューバー"},
{img:"roller.png", name:"ローラー"},
{img:"shelter.png", name:"シェルター"},
{img:"slosher.png", name:"スロッシャー"},
{img:"stringer.png", name:"ストリンガー"},
{img:"wiper.png", name:"ワイパー"}
]
}

// ===== 状態 =====
let state=JSON.parse(localStorage.getItem("salmonState")||"{}")
let showName = JSON.parse(localStorage.getItem("showName") ?? "true")

function save(){
localStorage.setItem("salmonState",JSON.stringify(state))
}

// ===== UI生成 =====
function createUI(){
let container=document.getElementById("weaponContainer")

for(let group in weaponData){

let row=document.createElement("div")
row.className="weaponRow"

let title=document.createElement("h3")
title.id="title_"+group
title.innerText=group

let bar=document.createElement("div")
bar.className="groupBar"

let fill=document.createElement("div")
fill.className="groupFill"
fill.id="bar_"+group

bar.appendChild(fill)

let grid=document.createElement("div")
grid.className="weaponGrid"

weaponData[group].forEach(data=>{

let btn=document.createElement("button")
btn.className="weaponBtn"

let wrapper=document.createElement("div")
wrapper.className="weaponItem"

let img=document.createElement("img")
img.src=`weapons/${group}/${data.img}`

let name=document.createElement("div")
name.className="weaponName"
name.innerText=data.name

wrapper.appendChild(img)
wrapper.appendChild(name)
btn.appendChild(wrapper)

let id=group+"_"+data.img

if(state[id]) btn.classList.add("done")

btn.onclick=()=>toggle(id,btn)

grid.appendChild(btn)

})

row.appendChild(title)
row.appendChild(bar)
row.appendChild(grid)
container.appendChild(row)
}
}

// ===== トグル =====
function toggle(id,el){
state[id]=!state[id]
el.classList.toggle("done")
save()
updateProgress()
}

// ===== 進捗 =====
function updateProgress(){
let total=0, done=0

for(let group in weaponData){

let gTotal=weaponData[group].length
let gDone=0

weaponData[group].forEach(data=>{
let id=group+"_"+data.img
total++
if(state[id]){ done++; gDone++ }
})

let percent=Math.floor(gDone/gTotal*100)
document.getElementById("bar_"+group).style.width=percent+"%"

let title=document.getElementById("title_"+group)
title.innerText=`${group} ${gDone} / ${gTotal} (${percent}%)`
}

let percent=Math.floor(done/total*100)
document.getElementById("totalBar").style.width=percent+"%"
document.getElementById("totalText").innerText=`${done} / ${total} (${percent}%)`
document.getElementById("remainText").innerText=`残り ${total-done} 武器`
}

// ===== 表示切替 =====
function showAll(){
document.querySelectorAll(".weaponBtn").forEach(b=>b.style.display="")
}

function showRemain(){
document.querySelectorAll(".weaponBtn").forEach(b=>{
b.style.display=b.classList.contains("done")?"none":""
})
}

// ===== 名前ON/OFF =====
function toggleName(){
showName=!showName
localStorage.setItem("showName",JSON.stringify(showName))
applyNameVisibility()
}

function applyNameVisibility(){
document.body.classList.toggle("hideName", !showName)
}

// ===== リセット =====
function resetAll(){
if(!confirm("リセットする？")) return
state={}
save()
location.reload()
}

// ===== 初期化 =====
createUI()
applyNameVisibility()
updateProgress()

</script>

</body>
</html>
