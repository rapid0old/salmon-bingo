<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サーモンラン武器ビンゴ</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:1000px;
width:95%;
margin:auto;
}

.weaponRow{
margin:30px auto;
padding:25px;

max-width:980px;

background:rgba(0,0,0,0.25);
border-radius:14px;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.weaponGrid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(90px,90px));
gap:18px;
justify-content:center;
margin-top:10px;
}

.weaponBtn{
width:90px;
height:90px;
border:none;
background:none;
padding:0;

display:flex;
align-items:center;
justify-content:center;
}

.weaponBtn img{
max-width:100%;
max-height:100%;
display:block;
margin:auto;
}

.done{
background:rgba(255,140,0,0.5);
border-radius:6px;
}

.progressBar{
width:80%;
height:18px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff7b00;
width:0%;
}

.groupBar{
width:70%;
height:14px;
background:#333;
margin:10px auto 18px auto;
border-radius:10px;
overflow:hidden;
}

.groupFill{
height:100%;
background:#ff7b00;
width:0%;
}

.complete{
color:#ffd700;
font-weight:bold;
}

.resetBtn{
margin:20px;
padding:18px 36px;
font-size:26px;
background:#ff7b00;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

<button onclick="toggleName()">名前 ON/OFF</button>

h2{
font-size:32px;
}

h3{
font-size:22px;
}

button{
font-size:22px;
padding:16px 28px;
margin:10px;
border-radius:10px;
color:black;
background:#eeeeee;
border:none;
cursor:pointer;
}

#totalText{
font-size:28px;
margin-top:10px;
}

#remainText{
font-size:24px;
margin-bottom:20px;
}

h3{
font-size:26px;
margin-bottom:10px;
}

.weaponBtn:hover{
transform:scale(1.1);
transition:0.15s;
}

@media (max-width:600px){

.weaponGrid{
grid-template-columns:repeat(10,1fr);
gap:4px;
}

.weaponBtn{
width:100%;
height:50px;
}

.weaponBtn img{
max-width:100%;
max-height:100%;
}

.weaponItem{
display:flex;
flex-direction:column;
align-items:center;
}

.weaponName{
font-size:12px;
margin-top:4px;
}

.hideName .weaponName{
display:none;
}

@media (max-width:600px){

.weaponRow{
padding:12px;
margin:18px auto;
}

}

}

</style>

</head>

<body>

<h2>サーモンラン武器ビンゴ</h2>

<button class="resetBtn" onclick="resetAll()">リセット</button>
<button onclick="showAll()">すべて</button>
<button onclick="showRemain()">未取得のみ</button>

<div class="progressBar">
<div id="totalBar" class="fill"></div>
</div>

<div id="totalText"></div>
<div id="remainText"></div>

<div class="container" id="weaponContainer"></div>

<script>

const weaponData={

シューター:[
{img:"bold.png", name:"ボールドマーカー"},

{img:"galon52.png", name:".52ガロン"},
{img:"galon96.png", name:".96ガロン"},

{img:"jetsweeper.png", name:"ジェットスイーパー"},
{img:"l3.png", name:"L3リールガン"},
{img:"nzap.png", name:"N-ZAP85"},
{img:"prime.png", name:"プライムシューター"},
{img:"pro.png", name:"プロモデラーMG"},
{img:"sharp.png", name:"シャープマーカー"},
{img:"space.png", name:"スペースシューター"},
{img:"splat.png", name:"スプラシューター"},
{img:"wakaba.png", name:"わかばシューター"}
],

ローラー:[
{img:"carbon.png", name:"カーボンローラー"},
{img:"dynamo.png", name:"ダイナモローラー"},
{img:"splat.png", name:"スプラローラー"},
{img:"variable.png", name:"ヴァリアブルローラー"},
{img:"wide.png", name:"ワイドローラー"}
],

チャージャー:[
{img:"litter.png", name:"リッター4K"},
{img:"pen.png", name:"R-PEN/5H"},
{img:"soi.png", name:"ソイチューバー"},
{img:"splat.png", name:"スプラチャージャー"},
{img:"squic.png", name:"スクイックリンα"},
{img:"take.png", name:"14式竹筒銃・甲"}
],

スロッシャー:[
{img:"bucket.png", name:"バケットスロッシャー"},
{img:"ex.png", name:"エクスプロッシャー"},
{img:"hissen.png", name:"ヒッセン"},
{img:"mop.png", name:"モップリン"},
{img:"over.png", name:"オーバーフロッシャー"},
{img:"screw.png", name:"スクリュースロッシャー"}
],

スピナー:[
{img:"barrel.png", name:"バレルスピナー"},
{img:"cugel.png", name:"クーゲルシュライバー"},
{img:"hyd.png", name:"ハイドラント"},
{img:"ixa.png", name:"イグザミナー"},
{img:"norch.png", name:"ノーチラス47"},
{img:"splat.png", name:"スプラスピナー"}
],

マニューバー:[
{img:"dual.png", name:"デュアルスイーパー"},
{img:"gaen.png", name:"ガエンFF"},
{img:"kelbin.png", name:"ケルビン525"},
{img:"quad.png", name:"クアッドホッパーブラック"},
{img:"spat.png", name:"スパッタリー"},
{img:"splat.png", name:"スプラマニューバー"}
],

シェルター:[
{img:"camp.png", name:"キャンピングシェルター"},
{img:"kasa.png", name:"24式張替傘・甲"},
{img:"para.png", name:"パラシェルター"},
{img:"spy.png", name:"スパイガジェット"}
],
  
ブラスター:[
{img:"crash.png", name:"クラッシュブラスター"},
{img:"hot.png", name:"ホットブラスター"},
{img:"long.png", name:"ロングブラスター"},
{img:"nova.png", name:"ノヴァブラスター"},
{img:"rapid.png", name:"ラピッドブラスター"},
{img:"rapide.png", name:"Rブラスターエリート"},
{img:"sblast.png", name:"S-BLAST92"}
],

フデ:[
{img:"fin.png", name:"フィンセント"},
{img:"hokusai.png", name:"ホクサイ"},
{img:"pablo.png", name:"パブロ"}
],

ストリンガー:[
{img:"fluid.png", name:"フルイドV"},
{img:"lact.png", name:"LACT-450"},
{img:"tri.png", name:"トライストリンガー"}
],

ワイパー:[
{img:"dental.png", name:"デンタルワイパー"},
{img:"drive.png", name:"ドライブワイパー"},
{img:"jim.png", name:"ジムワイパー"}
],

クマ武器:[
{img:"blaster.png", name:"クマサン印のブラスター"},
{img:"charger.png", name:"クマサン印のチャージャー"},
{img:"dualies.png", name:"クマサン印のマニューバー"},
{img:"roller.png", name:"クマサン印のローラー"},
{img:"shelter.png", name:"クマサン印のシェルター"},
{img:"slosher.png", name:"クマサン印のスロッシャー"},
{img:"stringer.png", name:"クマサン印のストリンガー"},
{img:"wiper.png", name:"クマサン印のワイパー"}
]

}

let state=JSON.parse(localStorage.getItem("salmonState")||"{}")

function save(){
localStorage.setItem("salmonState",JSON.stringify(state))
}

function toggle(id,el){

state[id]=!state[id]

if(state[id]){
el.classList.add("done")
}else{
el.classList.remove("done")
}

save()

updateProgress()

}

function createUI(){

let container=document.getElementById("weaponContainer")

for(let group in weaponData){

let row=document.createElement("div")

row.className="weaponRow"

let title=document.createElement("h3")
title.id="title_"+group
title.innerText=group

let bar=document.createElement("div")
bar.className="groupBar"

let fill=document.createElement("div")
fill.className="groupFill"
fill.id="bar_"+group

bar.appendChild(fill)

let grid=document.createElement("div")
if(group==="クマ武器"){
grid.className="weaponGrid kuma"
}else{
grid.className="weaponGrid"
}

weaponData[group].forEach(data=>{

let btn=document.createElement("button")
btn.className="weaponBtn"

let img=document.createElement("img")
img.src=`weapons/${group}/${data.img}`

let wrapper=document.createElement("div")
wrapper.className="weaponItem"

let name=document.createElement("div")
name.className="weaponName"
name.innerText=data.name

wrapper.appendChild(img)
wrapper.appendChild(name)

btn.appendChild(wrapper)

let id=group+"_"+data.img

if(state[id]) btn.classList.add("done")

btn.onclick=()=>toggle(id,btn)

grid.appendChild(btn)

})

row.appendChild(title)
row.appendChild(bar)
row.appendChild(grid)

container.appendChild(row)

}

}

function updateProgress(){

let total=0
let done=0

for(let group in weaponData){

let gTotal=weaponData[group].length
let gDone=0

weaponData[group].forEach(data=>{

let id=group+"_"+data.img

total++

if(state[id]){
done++
gDone++
}

})

let gPercent=Math.floor(gDone/gTotal*100)

document.getElementById("bar_"+group).style.width=gPercent+"%"

let title=document.getElementById("title_"+group)

title.innerText=group+" "+gDone+" / "+gTotal+" ("+gPercent+"%)"

if(gDone===gTotal){
title.innerText+=" ✅COMPLETE"
title.classList.add("complete")
}else{
title.classList.remove("complete")
}

}

let percent=Math.floor(done/total*100)

document.getElementById("totalBar").style.width=percent+"%"

document.getElementById("totalText").innerText=
done+" / "+total+" ("+percent+"%)"

if(done===total){
document.getElementById("totalText").innerText+=" 🎉ALL COMPLETE!"
}

let remain=total-done
document.getElementById("remainText").innerText="残り "+remain+" 武器"
  
}
  
function resetAll(){

if(!confirm("進行状況をリセットしますか？")) return

state={}
save()

document.querySelectorAll(".weaponBtn").forEach(btn=>{
btn.classList.remove("done")
})

updateProgress()

}

function showAll(){

document.querySelectorAll(".weaponBtn").forEach(btn=>{
btn.style.display=""
})

}

function showRemain(){

document.querySelectorAll(".weaponBtn").forEach(btn=>{

if(btn.classList.contains("done")){
btn.style.display="none"
}else{
btn.style.display=""
}

})

}

let showName = JSON.parse(localStorage.getItem("showName") ?? "true")

function saveName(){
localStorage.setItem("showName", JSON.stringify(showName))
}

function toggleName(){
showName = !showName
saveName()
applyNameVisibility()
}

function applyNameVisibility(){
if(showName){
document.body.classList.remove("hideName")
}else{
document.body.classList.add("hideName")
}
}

createUI()
applyNameVisibility()
updateProgress()

</script>

</body>
</html>
