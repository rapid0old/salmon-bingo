<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サーモンラン武器ビンゴ</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
margin:0;
}

.container{
max-width:1000px;
width:95%;
margin:0 auto;
text-align:center;
}

/* 上UI */
.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.weaponRow{
margin:30px auto;
padding:25px;
width:100%;
max-width:980px;
background:rgba(0,0,0,0.25);
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.weaponGrid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(90px,90px));
gap:18px;
justify-content:center;
margin-top:10px;
}

.weaponBtn{
width:90px;
height:90px;
border:none;
background:none;
padding:0;
display:flex;
align-items:center;
justify-content:center;
}

.weaponBtn img{
width:70px;
height:70px;
object-fit:contain;
}

.weaponItem{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

.weaponName{
font-size:11px;
text-align:center;
line-height:1.2;
max-width:90px;
min-height:2.4em;
margin-top:6px;
}

.hideName .weaponName{
display:none;
}

.done{
background:rgba(255,140,0,0.5);
border-radius:6px;
}

.progressBar{
width:80%;
height:18px;
background:#333;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff7b00;
width:0%;
}

.groupBar{
width:70%;
height:14px;
background:#333;
margin:10px auto 18px;
border-radius:10px;
overflow:hidden;
}

.groupFill{
height:100%;
background:#ff7b00;
width:0%;
}

.resetBtn{
padding:16px 28px;
font-size:20px;
background:#ff7b00;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button{
font-size:16px;
padding:10px 16px;
border-radius:10px;
background:#eee;
border:none;
cursor:pointer;
}

.weaponBtn:hover{
transform:scale(1.1);
transition:0.15s;
}

/* ===== スマホ ===== */
@media (max-width:600px){

.container{
width:100%;
max-width:none;
padding:0 10px;
}

.weaponRow{
max-width:none;
padding:12px;
margin:16px 0;
}

.weaponGrid{
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.weaponBtn{
width:100%;
aspect-ratio:1/1;
height:auto;
}

.weaponBtn img{
width:75%;
height:75%;
}

.weaponName{
font-size:12px;
}

.controls{
gap:6px;
}

button{
font-size:14px;
padding:8px 12px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>サーモンラン武器ビンゴ</h2>

<div class="controls">
<button class="resetBtn" onclick="resetAll()">リセット</button>
<button onclick="showAll()">すべて</button>
<button onclick="showRemain()">未取得のみ</button>
<button onclick="toggleName()">名前 ON/OFF</button>
</div>

<div class="progressBar">
<div id="totalBar" class="fill"></div>
</div>

<div id="totalText"></div>
<div id="remainText"></div>

<div id="weaponContainer"></div>

</div>

<script>

// ===== データ =====
const weaponData = {/* ←そのまま今のデータ貼る */}

// ===== 状態 =====
let state=JSON.parse(localStorage.getItem("salmonState")||"{}")
let showName = JSON.parse(localStorage.getItem("showName") ?? "true")

function save(){
localStorage.setItem("salmonState",JSON.stringify(state))
}

// ===== UI生成 =====
function createUI(){
let container=document.getElementById("weaponContainer")

for(let group in weaponData){

let row=document.createElement("div")
row.className="weaponRow"

let title=document.createElement("h3")
title.id="title_"+group
title.innerText=group

let bar=document.createElement("div")
bar.className="groupBar"

let fill=document.createElement("div")
fill.className="groupFill"
fill.id="bar_"+group

bar.appendChild(fill)

let grid=document.createElement("div")
grid.className="weaponGrid"

weaponData[group].forEach(data=>{

let btn=document.createElement("button")
btn.className="weaponBtn"

let wrapper=document.createElement("div")
wrapper.className="weaponItem"

let img=document.createElement("img")
img.src=`weapons/${group}/${data.img}`

let name=document.createElement("div")
name.className="weaponName"
name.innerText=data.name

wrapper.appendChild(img)
wrapper.appendChild(name)
btn.appendChild(wrapper)

let id=group+"_"+data.img

if(state[id]) btn.classList.add("done")

btn.onclick=()=>toggle(id,btn)

grid.appendChild(btn)

})

row.appendChild(title)
row.appendChild(bar)
row.appendChild(grid)
container.appendChild(row)
}
}

// ===== トグル =====
function toggle(id,el){
state[id]=!state[id]
el.classList.toggle("done")
save()
updateProgress()
}

// ===== 進捗 =====
function updateProgress(){
let total=0, done=0

for(let group in weaponData){

let gTotal=weaponData[group].length
let gDone=0

weaponData[group].forEach(data=>{
let id=group+"_"+data.img
total++
if(state[id]){ done++; gDone++ }
})

let percent=Math.floor(gDone/gTotal*100)
document.getElementById("bar_"+group).style.width=percent+"%"

let title=document.getElementById("title_"+group)
title.innerText=`${group} ${gDone} / ${gTotal} (${percent}%)`
}

let percent=Math.floor(done/total*100)
document.getElementById("totalBar").style.width=percent+"%"
document.getElementById("totalText").innerText=`${done} / ${total} (${percent}%)`
document.getElementById("remainText").innerText=`残り ${total-done} 武器`
}

// ===== 表示切替 =====
function showAll(){
document.querySelectorAll(".weaponBtn").forEach(b=>b.style.display="")
}

function showRemain(){
document.querySelectorAll(".weaponBtn").forEach(b=>{
b.style.display=b.classList.contains("done")?"none":""
})
}

// ===== 名前ON/OFF =====
function toggleName(){
showName=!showName
localStorage.setItem("showName",JSON.stringify(showName))
applyNameVisibility()
}

function applyNameVisibility(){
document.body.classList.toggle("hideName", !showName)
}

// ===== リセット =====
function resetAll(){
if(!confirm("リセットする？")) return
state={}
save()
location.reload()
}

// ===== 初期化 =====
createUI()
applyNameVisibility()
updateProgress()

</script>

</body>
</html>
