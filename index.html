<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>サーモンラン武器ビンゴ</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
text-align:center;
}

.container{
max-width:1000px;
width:95%;
margin:auto;
}

.weaponRow{
margin:30px auto;
padding:25px;

max-width:980px;

background:rgba(0,0,0,0.25);
border-radius:14px;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.weaponGrid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(90px,90px));
gap:18px;
justify-content:center;
margin-top:10px;
}

.weaponBtn{
width:90px;
height:90px;
border:none;
background:none;
padding:0;

display:flex;
align-items:center;
justify-content:center;
}

.weaponBtn img{
max-width:100%;
max-height:100%;
display:block;
margin:auto;
}

.done{
background:rgba(255,140,0,0.5);
border-radius:6px;
}

.progressBar{
width:80%;
height:18px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#ff7b00;
width:0%;
}

.groupBar{
width:70%;
height:14px;
background:#333;
margin:10px auto 18px auto;
border-radius:10px;
overflow:hidden;
}

.groupFill{
height:100%;
background:#ff7b00;
width:0%;
}

.complete{
color:#ffd700;
font-weight:bold;
}

.resetBtn{
margin:20px;
padding:18px 36px;
font-size:26px;
background:#ff7b00;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

h2{
font-size:32px;
}

h3{
font-size:22px;
}

button{
font-size:22px;
padding:16px 28px;
margin:10px;
border-radius:10px;
color:black;
background:#eeeeee;
border:none;
cursor:pointer;
}

#totalText{
font-size:28px;
margin-top:10px;
}

#remainText{
font-size:24px;
margin-bottom:20px;
}

h3{
font-size:26px;
margin-bottom:10px;
}

.weaponBtn:hover{
transform:scale(1.1);
transition:0.15s;
}

@media (max-width:600px){

.weaponGrid{
grid-template-columns:repeat(10,1fr);
gap:4px;
}

.weaponBtn{
width:100%;
height:50px;
}

.weaponBtn img{
max-width:100%;
max-height:100%;
}

@media (max-width:600px){

.weaponRow{
padding:12px;
margin:18px auto;
}

}

}

</style>

</head>

<body>

<h2>サーモンラン武器ビンゴ</h2>

<button class="resetBtn" onclick="resetAll()">リセット</button>
<button onclick="showAll()">すべて</button>
<button onclick="showRemain()">未取得のみ</button>

<div class="progressBar">
<div id="totalBar" class="fill"></div>
</div>

<div id="totalText"></div>
<div id="remainText"></div>

<div class="container" id="weaponContainer"></div>

<script>

const weaponData={

シューター:[
"bold.png",
"wakaba.png",
"sharp.png",
"pro.png",
"splat.png",
"galon52.png",
"nzap.png",
"prime.png",
"galon96.png",
"jetsweeper.png",
"space.png",
"l3.png",
"h3.png",
"bottle.png"
],

ローラー:[
"carbon.png",
"dynamo.png",
"splat.png",
"variable.png",
"wide.png"
],

チャージャー:[
"squic.png",
"splat.png",
"litter.png",
"take.png",
"soi.png",
"pen.png"
],

スロッシャー:[
"bucket.png",
"hissen.png",
"screw.png",
"over.png",
"ex.png",
"mop.png"
],

スピナー:[
"splat.png",
"barrel.png",
"hyd.png",
"cugel.png",
"norch.png",
"ixa.png"
],

マニューバー:[
"splat.png",
"splat.png",
"kelbin.png",
"dual.png",
"quad.png",
"gaen.png"
],

シェルター:[
"para.png",
"camp.png",
"spy.png",
"kasa.png"
],
  
ブラスター:[
"nova.png",
"hot.png",
"long.png",
"crash.png",
"rapid.png",
"rapide.png",
"sblast.png"
],

フデ:[
"pablo.png",
"hokusai.png",
"fin.png"
],

ストリンガー:[
"tri.png",
"lact.png",
"fluid.png"
],

ワイパー:[
"jim.png",
"drive.png",
"dental.png"
],

クマ武器:[
"stringer.png",
"blaster.png",
"shelter.png",
"wiper.png",
"slosher.png",
"charger.png",
"dualies.png",
"roller.png"
]

}

let state=JSON.parse(localStorage.getItem("salmonState")||"{}")

function save(){
localStorage.setItem("salmonState",JSON.stringify(state))
}

function toggle(id,el){

state[id]=!state[id]

if(state[id]){
el.classList.add("done")
}else{
el.classList.remove("done")
}

save()

updateProgress()

}

function createUI(){

let container=document.getElementById("weaponContainer")

for(let group in weaponData){

let row=document.createElement("div")

row.className="weaponRow"

let title=document.createElement("h3")
title.id="title_"+group
title.innerText=group

let bar=document.createElement("div")
bar.className="groupBar"

let fill=document.createElement("div")
fill.className="groupFill"
fill.id="bar_"+group

bar.appendChild(fill)

let grid=document.createElement("div")
if(group==="クマ武器"){
grid.className="weaponGrid kuma"
}else{
grid.className="weaponGrid"
}

weaponData[group].forEach(name=>{

let btn=document.createElement("button")
btn.className="weaponBtn"

let img=document.createElement("img")
img.src=`weapons/${group}/${name}`

btn.appendChild(img)

let id=group+"_"+name

if(state[id]) btn.classList.add("done")

btn.onclick=()=>toggle(id,btn)

grid.appendChild(btn)

})

row.appendChild(title)
row.appendChild(bar)
row.appendChild(grid)

container.appendChild(row)

}

}

function updateProgress(){

let total=0
let done=0

for(let group in weaponData){

let gTotal=weaponData[group].length
let gDone=0

weaponData[group].forEach(name=>{

let id=group+"_"+name

total++

if(state[id]){
done++
gDone++
}

})

let gPercent=Math.floor(gDone/gTotal*100)

document.getElementById("bar_"+group).style.width=gPercent+"%"

let title=document.getElementById("title_"+group)

title.innerText=group+" "+gDone+" / "+gTotal+" ("+gPercent+"%)"

if(gDone===gTotal){
title.innerText+=" ✅COMPLETE"
title.classList.add("complete")
}else{
title.classList.remove("complete")
}

}

let percent=Math.floor(done/total*100)

document.getElementById("totalBar").style.width=percent+"%"

document.getElementById("totalText").innerText=
done+" / "+total+" ("+percent+"%)"

if(done===total){
document.getElementById("totalText").innerText+=" 🎉ALL COMPLETE!"
}

let remain=total-done
document.getElementById("remainText").innerText="残り "+remain+" 武器"
  
}
  
function resetAll(){

if(!confirm("進行状況をリセットしますか？")) return

state={}
save()

document.querySelectorAll(".weaponBtn").forEach(btn=>{
btn.classList.remove("done")
})

updateProgress()

}

function showAll(){

document.querySelectorAll(".weaponBtn").forEach(btn=>{
btn.style.display=""
})

}

function showRemain(){

document.querySelectorAll(".weaponBtn").forEach(btn=>{

if(btn.classList.contains("done")){
btn.style.display="none"
}else{
btn.style.display=""
}

})

}

createUI()

updateProgress()

</script>

</body>
</html>
