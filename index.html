<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salmon Run Bingo</title>

<style>

body{
background:#0f1f1e;
color:white;
font-family:sans-serif;
text-align:center;
}

.wrapper{
max-width:900px;
margin:auto;
}

.board{
position:relative;
}

.board img{
width:100%;
}

/* ビンゴ部分だけ */
.grid{
position:absolute;

top:22%;
left:5%;

width:90%;
height:60%;

display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(8,1fr);
}

.cell{
border:none;
background:rgba(255,120,0,0);
}

.cell.done{
background:rgba(255,120,0,0.45);
}

/* 進捗バー */

.progressBar{
width:80%;
height:20px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#ff7b00;
width:0%;
}

.progressText{
margin:10px;
font-size:18px;
}

.resetBtn{
margin:10px;
padding:10px 20px;
font-size:16px;
background:#ff4d4d;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.groupList{
margin-top:10px;
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<h2>サーモンラン武器ビンゴ</h2>

<div class="progressBar">
<div class="progressFill" id="bar"></div>
</div>

<div class="progressText" id="total"></div>

<button class="resetBtn" onclick="resetProgress()">リセット</button>

<div class="groupList" id="groups"></div>

<div class="wrapper">

<div class="board">

<img src="bingo.jpg">

<div class="grid" id="grid"></div>

</div>

</div>

<script>

const TOTAL=71

/* 武器種ごとの数 */

const groupCounts={
シューター:7,
ローラー:6,
チャージャー:6,
ブラスター:7,
スロッシャー:6,
スピナー:6,
マニューバー:6,
シェルター:4,
フデ:5,
ワイパー:5,
ストリンガー:5,
クマ武器:8
}

let state=JSON.parse(localStorage.getItem("salmonBingo")||{})

/* 武器ID → グループ */

let groupMap={}

/* 簡易割当（後で正確にもできる） */

let groupNames=Object.keys(groupCounts)

for(let i=0;i<64;i++){

groupMap["w"+i]=groupNames[i%11]

}

for(let i=0;i<8;i++){

groupMap["k"+i]="クマ武器"

}

function save(){

localStorage.setItem("salmonBingo",JSON.stringify(state))

}

function toggle(id){

state[id]=!state[id]

save()

render()

}

function createGrid(){

let grid=document.getElementById("grid")

for(let i=0;i<64;i++){

let b=document.createElement("button")

b.className="cell"

b.dataset.id="w"+i

b.onclick=()=>toggle("w"+i)

grid.appendChild(b)

}

}

function render(){

let done=0

let groupDone={}

for(let g in groupCounts){

groupDone[g]=0

}

document.querySelectorAll(".cell").forEach(b=>{

let id=b.dataset.id

if(state[id]){

b.classList.add("done")

done++

groupDone[groupMap[id]]++

}else{

b.classList.remove("done")

}

})

let percent=Math.floor(done/TOTAL*100)

document.getElementById("total").innerText=

done+" / "+TOTAL+" ("+percent+"%)"

document.getElementById("bar").style.width=

percent+"%"

/* グループ進捗 */

let html=""

for(let g in groupCounts){

html+=g+" "+groupDone[g]+" / "+groupCounts[g]+"<br>"

}

document.getElementById("groups").innerHTML=html

}

function resetProgress(){

if(confirm("本当にリセットしますか？")){

state={}

save()

render()

}

}

createGrid()

render()

</script>

</body>
</html>
